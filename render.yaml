# Blueprint Render: https://render.com/docs/blueprint-spec
# Web Service com Docker (LibreOffice + FastAPI). Root do contexto = raiz do repositório.
services:
  - type: web
    name: gerador-contratos-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: LIBREOFFICE_PATH
        value: /usr/bin/soffice
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
